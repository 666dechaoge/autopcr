name: Build Docker Image

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      action:
        description: "Select an action to perform(Optional)"
        type: choice
        options:
          - none
          - build
          - build-and-push
        default: none

jobs:
  build_amd64:
    runs-on: ubuntu-latest
    steps:
      - name: Set Timezone
        uses: szenius/set-timezone@v2.0
        with:
          timezoneLinux: "Asia/Shanghai"

      - name: Get Current Date
        id: date
        run: echo "today=$(date +'%Y-%m-%d_%H-%M')" >> $GITHUB_ENV

      - name: Docker Setup QEMU
        uses: docker/setup-qemu-action@v3.3.0

      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@v3.8.0

      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Docker Login
        uses: docker/login-action@v3.3.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push for AMD64
        if: github.event_name == 'push' || github.event.inputs.action != 'none'
        uses: docker/build-push-action@v6.13.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' || github.event.inputs.action == 'build-and-push' }}
          tags: |
            ${{ vars.IMAGE_NAME }}:${{ env.today }}
            ${{ vars.IMAGE_NAME }}:latest
          cache-from: type=gha,scope=amd64-cache
          cache-to: type=gha,mode=max,scope=amd64-cache